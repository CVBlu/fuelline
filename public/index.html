<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FuelLine - Terminal Wait Times</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0a0c10; --surface: #111318; --surface2: #181b22; --border: #1f2330; --border2: #2a2f3d; --text: #e8eaf0; --muted: #5a6175; --muted2: #7a8299; --red: #cc1122; --red-glow: rgba(204,17,34,0.18); --red-border: rgba(204,17,34,0.35); --green: #22c55e; --amber: #f59e0b; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .banner-wrap { width: 100%; background: #0a0c10; padding: 0; display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; overflow: hidden; max-height: 120px; border-bottom: 2px solid #2a0509; }
  .banner-wrap img { width: 100%; max-width: 680px; height: 120px; object-fit: cover; object-position: center 50%; display: block; }
  .nav-bar { display: none; }
  main { max-width: 680px; margin: 0 auto; padding: 14px 16px 32px; }
  .summary-strip { display: flex; gap: 8px; margin-bottom: 14px; }
  .summary-pill { display: flex; align-items: center; gap: 7px; background: var(--surface); border: 1px solid var(--border2); border-radius: 6px; padding: 8px 14px; font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--muted2); flex: 1; justify-content: center; }
  .pill-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot-amber { background: var(--amber); box-shadow: 0 0 6px var(--amber); }
  .dot-red { background: var(--red); box-shadow: 0 0 5px var(--red); }
  .section-label { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; border-left: 2px solid var(--red); padding-left: 8px; }
  .terminal-card { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; margin-bottom: 10px; overflow: hidden; cursor: pointer; transition: border-color 0.2s, transform 0.15s; }
  .terminal-card:hover { border-color: var(--red); transform: translateY(-1px); }
  .terminal-card.status-closed { opacity: 0.55; }
  .card-top { padding: 14px 16px 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .card-left { flex: 1; min-width: 0; }
  .status-stripe { display: inline-flex; align-items: center; gap: 5px; font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 5px; }
  .stripe-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .stripe-open { color: var(--green); } .stripe-busy { color: var(--amber); } .stripe-closed { color: var(--red); }
  .terminal-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; color: var(--text); line-height: 1.1; margin-bottom: 4px; }
  .terminal-address { font-size: 12px; color: var(--muted2); margin-bottom: 5px; }
  .terminal-meta { font-size: 12px; color: var(--muted2); display: flex; gap: 12px; flex-wrap: wrap; }
  .wait-box { text-align: center; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border2); border-radius: 10px; padding: 10px 14px; min-width: 72px; }
  .wait-number { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 42px; line-height: 1; }
  .wait-unit { font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-top: 2px; }
  .wait-green { color: var(--green); } .wait-amber { color: var(--amber); } .wait-red { color: var(--red); } .wait-closed { color: var(--muted); }
  .card-lanes { padding: 0 16px 10px; display: flex; gap: 6px; flex-wrap: wrap; }
  .lane-pill { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; padding: 4px 10px; border-radius: 5px; }
  .lane-open { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
  .lane-busy { background: rgba(245,158,11,0.1); color: var(--amber); border: 1px solid rgba(245,158,11,0.2); }
  .lane-closed-pill { background: rgba(204,17,34,0.08); color: var(--red); border: 1px solid rgba(204,17,34,0.2); text-decoration: line-through; }
  .card-products { padding: 0 16px 12px; display: flex; gap: 5px; flex-wrap: wrap; }
  .prod-tag { font-family: 'Rajdhani', sans-serif; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 3px 9px; border-radius: 4px; background: var(--surface2); color: var(--muted2); border: 1px solid var(--border2); }
  .prod-unavail { color: var(--red); text-decoration: line-through; opacity: 0.6; }
  .card-footer { border-top: 1px solid var(--border); padding: 9px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 11px; color: var(--muted); }
  .report-btn { font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--red); background: none; border: none; cursor: pointer; padding: 0; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; padding: 16px; overflow-y: auto; }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 36px; }
  .modal { background: var(--surface); border: 1px solid var(--border2); border-radius: 16px; width: 100%; max-width: 480px; overflow: hidden; }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--surface2); }
  .modal-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; }
  .modal-body { padding: 20px; }
  .detail-stats { display: flex; gap: 8px; margin-bottom: 20px; }
  .detail-stat { flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; padding: 12px 8px; text-align: center; }
  .detail-stat-val { font-family: 'Rajdhani', sans-serif; font-size: 30px; font-weight: 700; color: var(--red); line-height: 1; }
  .detail-stat-lbl { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .detail-section { margin-bottom: 18px; }
  .detail-section-title { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
  .lane-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 12px; background: var(--surface2); border-radius: 6px; margin-bottom: 5px; }
  .lane-row-name { font-weight: 600; font-size: 14px; }
  .lane-row-note { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .status-badge { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; padding: 3px 8px; border-radius: 4px; }
  .badge-open { background: rgba(34,197,94,0.1); color: var(--green); }
  .badge-busy { background: rgba(245,158,11,0.1); color: var(--amber); }
  .badge-closed { background: rgba(204,17,34,0.08); color: var(--red); }
  .prod-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: var(--surface2); border-radius: 6px; margin-bottom: 5px; font-size: 13px; }
  .prod-status-ok { color: var(--green); font-size: 16px; }
  .prod-status-no { color: var(--red); font-size: 16px; }
  .prod-note { font-size: 11px; color: var(--muted); }
  .form-label { font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted2); display: block; margin-bottom: 8px; margin-top: 16px; }
  .wait-options { display: flex; gap: 6px; flex-wrap: wrap; }
  .wait-opt { padding: 9px 14px; border-radius: 6px; font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700; background: var(--surface2); border: 1px solid var(--border2); color: var(--muted2); cursor: pointer; }
  .wait-opt:hover, .wait-opt.selected { background: var(--red-glow); border-color: var(--red); color: var(--text); }
  .chip-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip { padding: 6px 12px; border-radius: 6px; font-family: 'Rajdhani', sans-serif; font-size: 12px; font-weight: 700; text-transform: uppercase; background: var(--surface2); border: 1px solid var(--border2); color: var(--muted2); cursor: pointer; }
  .chip:hover, .chip.selected { background: var(--red-glow); border-color: var(--red); color: var(--text); }
  textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 10px 12px; resize: none; height: 70px; }
  textarea:focus { outline: none; border-color: var(--red); }
  .submit-btn { width: 100%; margin-top: 20px; padding: 14px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
  .submit-btn:disabled { opacity: 0.35; cursor: default; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green); color: #0a0c10; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 14px; padding: 12px 24px; border-radius: 8px; transition: transform 0.3s ease; z-index: 300; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--red); color: #fff; }
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'Rajdhani', sans-serif; font-size: 15px; letter-spacing: 1.5px; text-transform: uppercase; }
  .closed-banner { background: rgba(204,17,34,0.08); border: 1px solid var(--red-border); border-radius: 8px; padding: 10px 14px; font-size: 13px; color: var(--red); margin-bottom: 16px; }
</style>
</head>
<body>
<div class="banner-wrap">
  <img src="/banner.PNG" alt="FuelLine">
</div>
<div class="nav-bar"></div>
<main>
  <div class="summary-strip" id="summaryStrip"></div>
  <div class="section-label">Terminals - Sorted by Distance</div>
  <div id="terminalList"><div class="loading">Loading terminals...</div></div>
</main>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Terminal</div>
      <button class="modal-close" onclick="closeModal()">X</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
var terminals = [];
var activeTerminalId = null;
var selectedWait = null;
var selectedIssues = [];

function loadTerminals() {
  fetch('/api/terminals')
    .then(function(res) { return res.json(); })
    .then(function(data) {
      terminals = data;
      renderSummary();
      renderList();
    })
    .catch(function() {
      document.getElementById('terminalList').innerHTML = '<div class="loading">Could not load terminals. Please refresh.</div>';
    });
}

function renderSummary() {
  var open = terminals.filter(function(t) { return t.status === 'open'; }).length;
  var busy = terminals.filter(function(t) { return t.status === 'busy'; }).length;
  var closed = terminals.filter(function(t) { return t.status === 'closed'; }).length;
  document.getElementById('summaryStrip').innerHTML =
    '<div class="summary-pill"><div class="pill-dot dot-green"></div>' + open + ' Open</div>' +
    '<div class="summary-pill"><div class="pill-dot dot-amber"></div>' + busy + ' Busy</div>' +
    '<div class="summary-pill"><div class="pill-dot dot-red"></div>' + closed + ' Closed</div>';
}

function waitClass(t) {
  if (t.status === 'closed') return 'wait-closed';
  if (t.wait_minutes < 20) return 'wait-green';
  if (t.wait_minutes < 50) return 'wait-amber';
  return 'wait-red';
}
function waitDisplay(t) { return t.status === 'closed' ? '--' : t.wait_minutes; }
function statusLabel(s) { return s === 'open' ? 'Open' : s === 'busy' ? 'Busy' : 'Closed'; }

function renderList() {
  var container = document.getElementById('terminalList');
  if (!terminals.length) { container.innerHTML = '<div class="loading">No terminals found.</div>'; return; }
  container.innerHTML = terminals.map(function(t) {
    var sc = t.status === 'open' ? 'var(--green)' : t.status === 'busy' ? 'var(--amber)' : 'var(--red)';
    var lanes = t.lanes.map(function(l) {
      return '<div class="lane-pill lane-' + (l.status === 'closed' ? 'closed-pill' : 'open') + '">Lane ' + l.number + (l.status === 'closed' ? ' X' : '') + '</div>';
    }).join('');
    return '<div class="terminal-card status-' + t.status + '" onclick="openDetail(' + t.id + ')">'  +
      '<div class="card-top">' +
        '<div class="card-left">' +
          '<div class="status-stripe stripe-' + t.status + '">' +
            '<div class="stripe-dot" style="background:' + sc + '"></div>' +
            statusLabel(t.status) +
          '</div>' +
          '<div class="terminal-name">' + t.name + '</div>' +
          '<div class="terminal-address">' + t.address + '</div>' +
          '<div class="terminal-meta">' +
            '<span>' + t.distance_miles + ' mi away</span>' +
            '<span>' + t.trucks_in_queue + ' in queue</span>' +
          '</div>' +
        '</div>' +
        '<div class="wait-box">' +
          '<div class="wait-number ' + waitClass(t) + '">' + waitDisplay(t) + '</div>' +
          '<div class="wait-unit">' + (t.status === 'closed' ? 'CLOSED' : 'MIN WAIT') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="card-lanes">' + lanes + '</div>' +
      '<div class="card-footer">' +
        '<span>Updated ' + t.last_updated + '</span>' +
        '<button class="report-btn" onclick="event.stopPropagation();openReport(' + t.id + ')">+ Report Wait Time</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function openDetail(id) {
  var t = terminals.find(function(x) { return x.id === id; });
  if (!t) return;
  activeTerminalId = id;
  document.getElementById('modalTitle').textContent = t.name;
  var openLanes = t.lanes.filter(function(l) { return l.status === 'open'; }).length;
  var lanes = t.lanes.map(function(l) {
    return '<div class="lane-row"><div><div class="lane-row-name">Lane ' + l.number + '</div>' +
      (l.reason ? '<div class="lane-row-note">' + l.reason + (l.reopen ? ' - Reopen: ' + l.reopen : '') + '</div>' : '') +
      '</div><div class="status-badge badge-' + (l.status === 'closed' ? 'closed' : 'open') + '">' + (l.status === 'closed' ? 'Closed' : 'Open') + '</div></div>';
  }).join('');
  document.getElementById('modalBody').innerHTML =
    (t.status === 'closed' ? '<div class="closed-banner">This terminal is currently closed.</div>' : '') +
    '<div class="detail-stats">' +
      '<div class="detail-stat"><div class="detail-stat-val ' + waitClass(t) + '">' + waitDisplay(t) + '</div><div class="detail-stat-lbl">Min Wait</div></div>' +
      '<div class="detail-stat"><div class="detail-stat-val">' + t.trucks_in_queue + '</div><div class="detail-stat-lbl">In Queue</div></div>' +
      '<div class="detail-stat"><div class="detail-stat-val">' + openLanes + '/' + t.lanes.length + '</div><div class="detail-stat-lbl">Lanes Open</div></div>' +
    '</div>' +
    '<div class="detail-section"><div class="detail-section-title">Lane Status</div>' + lanes + '</div>' +
    '<div class="detail-section"><div class="detail-section-title">Products Available</div>' + prods + '</div>' +
    '<button class="submit-btn" onclick="openReport(' + t.id + ')" style="background:var(--surface2);color:var(--red);border:1px solid var(--red-border)">+ Submit a Wait Time Report</button>';
  document.getElementById('modalOverlay').classList.add('open');
}

function openReport(id) {
  var t = terminals.find(function(x) { return x.id === id; });
  if (!t) return;
  activeTerminalId = id;
  selectedWait = null;
  selectedIssues = [];
  document.getElementById('modalTitle').textContent = 'Report - ' + t.name.split('-')[0].trim();
  document.getElementById('modalOverlay').classList.add('open');
  showReportForm(t);
}

var closedLanes = [];
function toggleLane(el,num){el.classList.toggle("selected");if(closedLanes.includes(num))closedLanes=closedLanes.filter(function(n){return n!==num;});else closedLanes.push(num);}
function showReportForm(t) {
  var waitOpts = ['Under 15','20','30','45','60','75','90+','Terminal Closed'].map(function(w) {
    return '<div class="wait-opt" onclick="selectWait(this,\'' + w + '\')">'  + w + '</div>';
  }).join('');
  var chips = ['Lane Closed','Product Out','Meter Issue','Gate Problem','Safety Concern','Equipment Failure','Vapor Recovery Issue'].map(function(i) {
    return '<div class="chip" onclick="toggleIssue(this,\'' + i + '\')">'  + i + '</div>';
  }).join('');
  document.getElementById('modalBody').innerHTML =
    '<div class="report-form">' +
    '<label class="form-label">Current Wait Time (minutes)</label>' +
    '<div class="wait-options">' + waitOpts + '</div>' +
    '<label class="form-label">Mark Closed Lanes</label>' + '<div class="chip-group">' + (t&&t.lanes?t.lanes.map(function(l){return '<div class="chip" onclick="toggleLane(this,'+l.number+')">Lane '+l.number+'</div>';}).join(''):'') + '</div>' + '<label class="form-label">Any Other Issues? (optional)</label>' +
    '<div class="chip-group">' + chips + '</div>' +
    '<label class="form-label">Notes (optional)</label>' +
    '<textarea id="reportNote" placeholder="e.g. Lane 3 is down..."></textarea>' +
    '<button class="submit-btn" id="submitBtn" onclick="submitReport()" disabled>Submit Report</button>' +
    '</div>';
}

function selectWait(el, val) {
  document.querySelectorAll('.wait-opt').forEach(function(e) { e.classList.remove('selected'); });
  el.classList.add('selected');
  selectedWait = val;
  document.getElementById('submitBtn').disabled = false;
}

function toggleIssue(el, val) {
  el.classList.toggle('selected');
  if (selectedIssues.includes(val)) selectedIssues = selectedIssues.filter(function(i) { return i !== val; });
  else selectedIssues.push(val);
}

function submitReport() {
  if (!selectedWait) return;
  var btn = document.getElementById('submitBtn');
  btn.textContent = 'Submitting...';
  btn.disabled = true;
  var waitMap = { 'Under 15': 10, '20': 20, '30': 30, '45': 45, '60': 60, '75': 75, '90+': 90, 'Terminal Closed': 0 };
  var waitMinutes = waitMap[selectedWait] !== undefined ? waitMap[selectedWait] : 30;
  var note = document.getElementById('reportNote') ? document.getElementById('reportNote').value : '';
  fetch('/api/terminals/' + activeTerminalId + '/report', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ wait_minutes: waitMinutes, lane_issue: selectedIssues.join(', '), note: note })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var idx = terminals.findIndex(function(t) { return t.id === activeTerminalId; });
    if (idx > -1) terminals[idx] = data.terminal;
    closeModal(); renderSummary(); renderList();
    showToast('Report submitted - thank you!');
  })
  .catch(function() {
    btn.textContent = 'Submit Report';
    btn.disabled = false;
    showToast('Error submitting. Try again.', true);
  });
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
document.getElementById('modalOverlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (isError ? ' error' : '');
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3500);
}

loadTerminals();
setInterval(loadTerminals, 60000);
</script>
</body>
</html>
